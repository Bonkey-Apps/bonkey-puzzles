name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  # Manual re-deploy of the current main. Re-running a *previous* run is unsafe:
  # deploy-pages@v5 aborts if a run has >1 "github-pages" artifact, and each
  # re-run adds another one. A fresh dispatch starts a new run with zero
  # artifacts, so it always deploys the current main cleanly.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '["ubuntu-latest"]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v5
