name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-progress so a merge
# doesn't leave the site in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '["self-hosted","linux","x64","gce-c3-spot"]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
