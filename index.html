<!doctype html>
<!--
  Bonkey Puzzles — GitHub Pages landing page (bonkey-puzzles repo root).

  This file is the SOURCE for the root index.html that ci-pages-deploy.yml syncs
  into the bonkey-puzzles repo root alongside app/. It is intentionally static,
  self-contained, and offline: no external fonts, scripts, images, or network
  calls (ADR 0001). The only link is to the deployed web demo at app/.

  Keep relative ("app/") so it works at https://bonkey-apps.github.io/bonkey-puzzles/.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bonkey Puzzles</title>
    <meta
      name="description"
      content="Bonkey Puzzles — a fully offline mobile puzzle hub. Play the free web demo."
    />
    <style>
      :root {
        --teal: #16b8ae;
        --coral: #ff6f61;
        --sun: #ffb13c;
        --ink: #243042;
        --cream: #fff6ec;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 0%, #fffaf2, var(--cream));
        color: var(--ink);
        /* Brand fonts are Baloo 2 / Nunito; fall back to a rounded system stack
           so this page never makes a network font request. */
        font-family:
          "Nunito",
          "Segoe UI",
          system-ui,
          -apple-system,
          "Helvetica Neue",
          Arial,
          sans-serif;
        text-align: center;
        padding: 24px;
      }
      main {
        max-width: 560px;
        width: 100%;
      }
      h1 {
        font-family: "Baloo 2", "Nunito", system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(2.5rem, 9vw, 4rem);
        margin: 0 0 0.25em;
        letter-spacing: -0.01em;
      }
      h1 .b1 {
        color: var(--teal);
      }
      h1 .b2 {
        color: var(--coral);
      }
      p.tagline {
        font-size: clamp(1rem, 3.5vw, 1.25rem);
        line-height: 1.5;
        margin: 0 auto 2em;
        max-width: 40ch;
        opacity: 0.85;
      }
      a.cta {
        display: inline-block;
        background: var(--coral);
        color: #fff;
        font-weight: 800;
        font-size: clamp(1.1rem, 4vw, 1.4rem);
        text-decoration: none;
        padding: 0.85em 2.2em;
        border-radius: 999px;
        box-shadow: 0 8px 20px rgba(255, 111, 97, 0.35);
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
      }
      a.cta:hover,
      a.cta:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 12px 26px rgba(255, 111, 97, 0.45);
        outline: none;
      }
      a.cta:focus-visible {
        outline: 3px solid var(--teal);
        outline-offset: 3px;
      }
      .badge {
        display: inline-block;
        margin-bottom: 1.5em;
        padding: 0.35em 1em;
        border-radius: 999px;
        background: rgba(22, 184, 174, 0.12);
        color: var(--teal);
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      footer {
        margin-top: 3em;
        font-size: 0.85rem;
        opacity: 0.6;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: radial-gradient(circle at 50% 0%, #1b2436, #131a28);
          color: #eef3fa;
        }
        p.tagline {
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Free web demo</span>
      <h1><span class="b1">Bonkey</span> <span class="b2">Puzzles</span></h1>
      <p class="tagline">
        A cozy, fully offline puzzle hub — Word Search and more, no ads, no sign-in, no tracking.
      </p>
      <a class="cta" href="app/">Play the demo</a>
      <footer>© Bonkey Apps</footer>
    </main>
  </body>
</html>
